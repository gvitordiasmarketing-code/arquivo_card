<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contrato</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body{
            background: linear-gradient(-45deg,rgb(211, 125, 21),rgb(123, 255, 0),rgb(0, 247, 255),rgb(235,0,0));
            background-size: 400% 400%;
            animation: gradientBG 5s ease infinite;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
            color: rgb(2, 16, 16);

        }
        @keyframes gradientBG{
        0% {background-position:0% 50% ;}
        50%{background-position: 100% 50%;}
        100%{background-position: 0% 50%;}
        }
        .card{
            background: rgb(51, 122, 57) ;
            padding: 20px;
            border-radius: 12px;
            width: 320px;
            text-align: center;
            box-shadow: 0 10px 25px rgb(0, 0,0);
        
        }
        .imgperfil{
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 5px solid rgb(13, 13, 242);
            margin-bottom: 12px;
            object-fit: fill;
        }
        h2{
            margin: 10px 0 5px;
            font-size: 18px;
        }
        .local{
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
        }
        .job{
            font-size: 16px;
            line-height: 1.5;
        }
        .botoes{
            margin: 20px 0;
            display: flex;
            justify-content: center;
            gap: 10px
        }
        .btn{
            padding: 10px 18px;
            border-radius: 6px;
            border: 1px solid rgb(23, 30, 32);
            cursor: pointer;
            font-size: 15px;
            transition:  0.3;
        }
        .btn:hover{
            opacity: 0.8;
            background: #2146ea;
        }
        .skills{
            margin-top: 12px;
            text-align: left;
        }
        .skills h3{
            font-size: 20px;
            margin-bottom: 10px;
        }
        .tags{
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .tag{
            border: 1px solid rgb(228, 236, 239);
            padding: 5px 10px;
            border-radius: 4px;

        }
        .social-media{
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 20px;
        }
        .social-media i{
            cursor: pointer;
            transition: 0.3s;
            
        }
        .social-media{
            color: aliceblue;
            font-size: 20PX;
            transition: 0.3s;
        }
        .social-media a{
            text-decoration: none;
            color: rgb(5, 33, 57);
        }
        .social-media a:hover{
            color: rgb(40, 21, 211);
            transform: scale(1.2);
        }
        

    </style>
</head>
<body>
    <div class="card">
        <img src="biel.png" alt="Foto de Perfil" class="imgperfil">
        <h2>Gabriel Vitor Dias Rocha</h2>
        <div class="local"> Montes Claros - MG </div>
        <div class="job">Estudante de T.I<br>Técnico em Informática</div>


        <div class="botoes">
            <a href="https://wa.we/5538999105524?text=Olá,%20vim%20pelo%20card." class="btn primario">Mensagem</a>
            <a href="https://www.instagram.com/gabrielvitor_22?igsh=MTFpMDVmdjRuejh0aA==" class="btn secundario">Follow</a>
        </div>
        <div class="skills">
            <h3>Habilidades</h3>
            <div class="tags">
                <span class="tag">Especialista em vendas(telemarketing)</span>
                <span class="tag">Conhecimento em energia quantica</span>
                <span class="tag">Javascript</span>
                <span class="tag">Habilidades em python</span>
                <span class="tag">Analista de dados</span>
                <span class="tag">Banco de dados</span>
                <span class="tag">Conhecimento em linux</span>
                <span class="tag">Conhecimento em windows</span>
            </div>
        </div>
        <div class="social-media">
            <a href="" target="_blank"><i class="fab fa-facebook"></i></a>
            <a href="https://github.com/gvitordiasmarketing-code" target="_blank"><i class="fab fa-github"></i></a>
            <a href="https://www.linkedin.com/in/gabriel-vitor-9aa3713b3/" target="_blank"><i class="fab fa-linkedin"></i></a>
            <a href="https://www.instagram.com/gabrielvitor_22?igsh=MTFpMDVmdjRuejh0aA==" target="_blank"><i class="fab fa-instagram"></i></a>
        </div>
    </div>
</body>
</html>
